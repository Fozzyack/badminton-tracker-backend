services:
  postgres:
    image: postgres:16
    container_name: badminton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: badminton
    ports:
      - "5433:5432"
    volumes:
      - badminton:/var/lib/postgresql/data

volumes:
  badminton:
